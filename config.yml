# Fuzzer defaults. Command-line options override these values.
preset: pdf_full
artifact_dir: artifacts
iters: 0
timeout: 2.0
log_every: 1000
report_coverage_every: 100
min_data_labels: 0
max_data_labels: 8
min_words_per_label: 1
max_words_per_label: 6
min_text: 1
max_text: 64
max_total_data_words: 32
max_total_text_words: 96
edge_prob: 0.35
allow_empty_data: true
# TA guidance: keep `.word` single-value only for the active fuzzer path.
allow_multi_value_word: false
allow_negative_memory_offsets: true
allow_zero_dest_register: true
coverage_mode: coverage_first
coverage_targets:
complexity_mode: mixed
complexity_ramp_interval: 250
use_small_exhaustive_first: true
